{% extends 'projects/base.html' %}

{% block content %}
<div class="form-container" style="max-width: 480px;">
    <h2 style="margin-top: 0; margin-bottom: 0.75rem; color: var(--text-primary);">Delete Account</h2>
    <p style="color: var(--text-secondary); margin-bottom: 1.5rem; line-height: 1.6;">
        This will permanently delete your account and all related projects and profile data.
        This action cannot be undone.
    </p>

    <form method="post" novalidate>
        {% csrf_token %}
        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
            <button type="submit" class="btn btn-danger" style="flex: 1; min-width: 140px;">Yes, Delete My Account</button>
            <a href="{% url 'profile_edit' %}" class="btn btn-secondary" style="flex: 1; text-align: center; min-width: 140px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
